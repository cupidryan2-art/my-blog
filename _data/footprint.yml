# 长居
- id: hangzhou
  name: 杭州
  date: "2000-09"
  lat: 30.2741
  lng: 120.1551
  type: lived
  description: 我的家乡，生长了十八年的地方。西湖边的风，建国北路的咖啡店，凤起路——都是不会忘记的地名。
  content:
    - type: text
      value: 四月的杭州，天气乍暖还寒，行道树将阴凉的树影洒落在沿河的路上。能迎着春风伴着月色在操场一圈一圈走着的日子令人留念，正是因为我们知道明天有无数的不期而遇的美好。

- id: kuala-lumpur
  name: 吉隆坡 · XMUM
  date: "2024-09"
  lat: 2.9213
  lng: 101.7768
  type: lived
  description: 就读厦门大学马来西亚分校。从南国的湿热开始，重新认识另一个世界。
  content:
    - type: text
      value: 夜半秋凉，骑在回家的路上。空中飘着细细的雨丝，是那种在黑夜中看不见、却会使你浑身湿透的那种雨。

