layout: default
---

{% include social-links.html %}
{% include font-sizer.html %}

<style>
.fp-page { width: 100%; padding-bottom: 3rem; }

.fp-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 2rem 0 1.2rem;
}
.fp-title {
  font-family: var(--ff-serif); font-size: 1.6rem; font-weight: 700;
  color: var(--text-1); margin: 0 0 0.15rem; letter-spacing: -0.02em;
}
.fp-subtitle { font-size: 0.75rem; color: var(--text-3); margin: 0; }
.fp-legend { display: flex; align-items: center; gap: 1rem; }
.fp-legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.72rem; color: var(--text-3);
  font-family: var(--ff-sans);
}
.fp-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; }
.fp-dot-lived   { background: #FF9F0A; }
.fp-dot-visited { background: #30C2C2; }

/* Map container */
.fp-map-wrap {
  position: relative; width: 100%;
  border-radius: 12px; overflow: hidden;
  border: 1px solid var(--border);
  background: #d6e8f5;
  user-select: none;
  line-height: 0;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
}
html[data-mode="dark"] .fp-map-wrap { background: #0e1a2b; }

/* Map hint */
.fp-hint {
  position: absolute; bottom: 10px; right: 12px;
  font-size: 0.65rem; color: rgba(0,0,0,0.35);
  font-family: var(--ff-sans); pointer-events: none; z-index: 5;
}
html[data-mode="dark"] .fp-hint { color: rgba(255,255,255,0.3); }

/* Zoom controls */
.fp-zoom {
  position: absolute; top: 10px; right: 12px;
  display: flex; flex-direction: column; gap: 3px; z-index: 10;
}
.fp-zoom-btn {
  width: 26px; height: 26px; border-radius: 6px;
  border: 1px solid rgba(0,0,0,0.12); background: #fff;
  color: #555; font-size: 14px; line-height: 1;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  font-family: monospace;
}
.fp-zoom-btn:hover { background: #f0f0f0; }
html[data-mode="dark"] .fp-zoom-btn {
  background: #1e2d3f; border-color: rgba(255,255,255,0.15); color: #ccc;
}
html[data-mode="dark"] .fp-zoom-btn:hover { background: #263444; }

/* SVG map */
#fpSvgMap {
  width: 100%; height: 440px; display: block;
  cursor: grab;
}
#fpSvgMap:active { cursor: grabbing; }

/* Country colors in dark mode */
html[data-mode="dark"] #fpSvgMap g#countries {
  fill: #1e3050 !important;
  stroke: rgba(255,255,255,0.05) !important;
}

/* Tooltip */
.fp-label {
  position: absolute; background: #fff;
  border: 1px solid rgba(0,0,0,0.1); border-radius: 8px;
  padding: 5px 11px; pointer-events: none;
  transform: translate(-50%, -130%);
  display: none; z-index: 20;
  font-family: var(--ff-sans);
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  line-height: 1.5;
}
html[data-mode="dark"] .fp-label {
  background: #1e2d3f; border-color: rgba(255,255,255,0.12);
}
.fp-label.show { display: block; }
.fp-label-name { font-size: 0.8rem; font-weight: 600; color: #111; display: block; }
.fp-label-date { font-size: 0.7rem; color: #888; }
html[data-mode="dark"] .fp-label-name { color: #f0f0f0; }
html[data-mode="dark"] .fp-label-date { color: #8a9ab0; }

/* Detail view */
.fp-detail { display: none; padding-top: 1.5rem; }
.fp-back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.82rem; font-family: var(--ff-sans);
  color: var(--text-2); background: none; border: none;
  padding: 0; cursor: pointer; margin-bottom: 2rem;
  transition: color 0.2s;
}
.fp-back-btn:hover { color: var(--text-1); }
.fp-detail-name {
  font-family: var(--ff-serif) !important; font-size: 2rem !important;
  font-weight: 700 !important; color: var(--text-1) !important;
  margin: 0 0 0.6rem !important; letter-spacing: -0.02em;
}
.fp-detail-info { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; }
.fp-detail-date { font-size: 0.8rem; color: var(--text-3); font-family: var(--ff-sans); }
.fp-detail-tag {
  font-size: 0.7rem; font-family: var(--ff-sans);
  padding: 2px 10px; border-radius: 999px; font-weight: 500;
}
.fp-detail-desc {
  font-size: 0.9rem; color: var(--text-2); line-height: 1.7;
  max-width: 600px; margin-bottom: 1.5rem !important;
  border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;
}
.fp-body-text {
  font-size: 1rem; color: var(--text-1); line-height: 1.85;
  margin-bottom: 1.4rem !important; max-width: 600px;
}
.fp-body-img { margin: 1.5rem 0 !important; max-width: 600px; }
.fp-body-img img {
  width: 100%; max-height: 360px; object-fit: cover;
  border-radius: 10px; display: block;
}
.fp-body-img figcaption {
  font-size: 0.75rem; color: var(--text-3);
  text-align: center; margin-top: 0.5rem; font-style: italic;
}
</style>

<div class="fp-page">
  <div id="fpMapView">
    <div class="fp-header">
      <div>
        <h1 class="fp-title">足迹</h1>
        <p class="fp-subtitle">走过的地方</p>
      </div>
      <div class="fp-legend">
        <span class="fp-legend-item"><i class="fp-dot fp-dot-lived"></i>长居</span>
        <span class="fp-legend-item"><i class="fp-dot fp-dot-visited"></i>到访</span>
      </div>
    </div>

    <div class="fp-map-wrap" id="fpMapWrap">
      {% include world-map.svg %}
      <div class="fp-label" id="fpLabel">
        <span class="fp-label-name" id="fpLabelName"></span>
        <span class="fp-label-date" id="fpLabelDate"></span>
      </div>
      <div class="fp-zoom">
        <button class="fp-zoom-btn" id="fpZoomIn"  title="放大">+</button>
        <button class="fp-zoom-btn" id="fpZoomOut" title="缩小">−</button>
        <button class="fp-zoom-btn" id="fpZoomReset" title="重置" style="font-size:11px">⊙</button>
      </div>
      <div class="fp-hint">滚轮缩放 · 拖拽平移 · 点击查看详情</div>
    </div>
  </div>

  <div class="fp-detail" id="fpDetail">
    <button class="fp-back-btn" id="fpBack">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/>
      </svg>
      返回地图
    </button>
    <div id="fpDetailInner"></div>
  </div>
</div>

<script>
(function () {
  // Full footprint data for detail panel
  var DATA = {{ site.data.footprint | jsonify }};
  if (!Array.isArray(DATA)) DATA = [];
  var byId = {};
  DATA.forEach(function (fp) { byId[fp.id] = fp; });

  var COLORS = {
    lived:   '#FF9F0A',
    visited: '#30C2C2',
    special: '#FF375F'
  };

  var wrap  = document.getElementById('fpMapWrap');
  var label = document.getElementById('fpLabel');
  var lname = document.getElementById('fpLabelName');
  var ldate = document.getElementById('fpLabelDate');
  var svg   = wrap ? wrap.querySelector('svg') : null;
  if (!svg) return;

  // ── Set up SVG ──────────────────────────────────────────────
  svg.id = 'fpSvgMap';
  svg.setAttribute('preserveAspectRatio', 'none');
  svg.style.width  = '100%';
  svg.style.height = '440px';

  var W = 960, H = 500;
  var vb = { x: 0, y: 0, w: W, h: H }; // current viewBox

  function setVB() {
    // Clamp pan so map edges don't scroll fully off screen
    vb.w = Math.max(100, Math.min(W, vb.w));
    vb.h = Math.max(52,  Math.min(H, vb.h));
    vb.x = Math.max(-vb.w * 0.3, Math.min(W - vb.w * 0.7, vb.x));
    vb.y = Math.max(-vb.h * 0.3, Math.min(H - vb.h * 0.7, vb.y));
    svg.setAttribute('viewBox', [vb.x.toFixed(1), vb.y.toFixed(1),
                                  vb.w.toFixed(1), vb.h.toFixed(1)].join(' '));
  }
  setVB();

  // ── Zoom/Pan ────────────────────────────────────────────────
  svg.addEventListener('wheel', function (e) {
    e.preventDefault();
    label.classList.remove('show');
    var factor = e.deltaY > 0 ? 1.18 : 0.85;
    var sr = svg.getBoundingClientRect();
    var mx = vb.x + (e.clientX - sr.left) / sr.width  * vb.w;
    var my = vb.y + (e.clientY - sr.top)  / sr.height * vb.h;
    vb.w *= factor; vb.h *= factor;
    vb.x = mx - (e.clientX - sr.left) / sr.width  * vb.w;
    vb.y = my - (e.clientY - sr.top)  / sr.height * vb.h;
    setVB();
  }, { passive: false });

  var drag = { on: false, sx: 0, sy: 0, ox: 0, oy: 0 };
  svg.addEventListener('mousedown', function (e) {
    if (e.target.classList.contains('fp-pin')) return;
    drag.on = true; drag.sx = e.clientX; drag.sy = e.clientY;
    drag.ox = vb.x; drag.oy = vb.y;
  });
  document.addEventListener('mousemove', function (e) {
    if (!drag.on) return;
    var sr = svg.getBoundingClientRect();
    vb.x = drag.ox - (e.clientX - drag.sx) / sr.width  * vb.w;
    vb.y = drag.oy - (e.clientY - drag.sy) / sr.height * vb.h;
    setVB();
  });
  document.addEventListener('mouseup', function () { drag.on = false; });

  // Touch pan/pinch
  var touch = { prev: null };
  wrap.addEventListener('touchstart', function (e) {
    touch.prev = e.touches;
  }, { passive: true });
  wrap.addEventListener('touchmove', function (e) {
    e.preventDefault();
    label.classList.remove('show');
    var t = e.touches;
    if (t.length === 1 && touch.prev && touch.prev.length === 1) {
      var sr = svg.getBoundingClientRect();
      vb.x -= (t[0].clientX - touch.prev[0].clientX) / sr.width  * vb.w;
      vb.y -= (t[0].clientY - touch.prev[0].clientY) / sr.height * vb.h;
      setVB();
    } else if (t.length === 2 && touch.prev && touch.prev.length === 2) {
      var d0 = Math.hypot(touch.prev[0].clientX - touch.prev[1].clientX,
                          touch.prev[0].clientY - touch.prev[1].clientY);
      var d1 = Math.hypot(t[0].clientX - t[1].clientX,
                          t[0].clientY - t[1].clientY);
      if (d0 > 0) {
        var factor = d0 / d1;
        var mx = ((t[0].clientX + t[1].clientX) / 2);
        var my = ((t[0].clientY + t[1].clientY) / 2);
        var sr = svg.getBoundingClientRect();
        var bx = vb.x + (mx - sr.left) / sr.width  * vb.w;
        var by = vb.y + (my - sr.top)  / sr.height * vb.h;
        vb.w *= factor; vb.h *= factor;
        vb.x = bx - (mx - sr.left) / sr.width  * vb.w;
        vb.y = by - (my - sr.top)  / sr.height * vb.h;
        setVB();
      }
    }
    touch.prev = t;
  }, { passive: false });

  // Zoom buttons
  function zoomAt(factor) {
    label.classList.remove('show');
    var cx = vb.x + vb.w / 2, cy = vb.y + vb.h / 2;
    vb.w *= factor; vb.h *= factor;
    vb.x = cx - vb.w / 2; vb.y = cy - vb.h / 2;
    setVB();
  }
  document.getElementById('fpZoomIn').addEventListener('click',    function () { zoomAt(0.7); });
  document.getElementById('fpZoomOut').addEventListener('click',   function () { zoomAt(1.43); });
  document.getElementById('fpZoomReset').addEventListener('click', function () {
    vb = { x: 0, y: 0, w: W, h: H }; setVB();
  });

  // ── Marker interactions ──────────────────────────────────────
  var pins = svg.querySelectorAll('.fp-pin');
  pins.forEach(function (pin) {
    pin.addEventListener('mouseenter', function () {
      var pr = pin.getBoundingClientRect();
      var wr = wrap.getBoundingClientRect();
      label.style.left = (pr.left + pr.width / 2 - wr.left) + 'px';
      label.style.top  = (pr.top  - wr.top) + 'px';
      lname.textContent = pin.dataset.name;
      ldate.textContent = pin.dataset.date;
      label.classList.add('show');
    });
    pin.addEventListener('mouseleave', function () {
      label.classList.remove('show');
    });
    pin.addEventListener('click', function (e) {
      e.stopPropagation();
      label.classList.remove('show');
      showDetail(pin.dataset.id);
    });
  });

  // ── Detail panel ─────────────────────────────────────────────
  function showDetail(id) {
    var fp = byId[id];
    if (!fp) return;
    document.getElementById('fpMapView').style.display = 'none';
    document.getElementById('fpDetail').style.display  = 'block';
    var fill  = COLORS[fp.type] || COLORS.visited;
    var tlabel = { lived: '长居', visited: '到访', special: '特别记忆' }[fp.type] || fp.type;
    var body  = '';
    (fp.content || []).forEach(function (b) {
      if (b.type === 'text')
        body += '<p class="fp-body-text">' + b.value + '</p>';
      else if (b.type === 'image')
        body += '<figure class="fp-body-img"><img src="' + b.src + '" alt="' +
                (b.caption || '') + '" loading="lazy">' +
                (b.caption ? '<figcaption>' + b.caption + '</figcaption>' : '') +
                '</figure>';
    });
    document.getElementById('fpDetailInner').innerHTML =
      '<h2 class="fp-detail-name">' + fp.name + '</h2>' +
      '<div class="fp-detail-info">' +
        '<span class="fp-detail-date">' + fp.date + '</span>' +
        '<span class="fp-detail-tag" style="background:' + fill + '22;color:' + fill +
        ';border:1px solid ' + fill + '44">' + tlabel + '</span>' +
      '</div>' +
      '<p class="fp-detail-desc">' + (fp.description || '') + '</p>' +
      body;
    window.scrollTo(0, 0);
  }

  document.getElementById('fpBack').addEventListener('click', function () {
    document.getElementById('fpDetail').style.display  = 'none';
    document.getElementById('fpMapView').style.display = 'block';
  });
})();
</script>
